<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM | Perifa Mídia</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#f4f6f1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260609-deploy-fix">
    <link rel="stylesheet" href="./assets/css/crm.css?v=20260609-deploy-fix">
    <script src="./assets/js/database.js?v=20260609-deploy-fix" defer></script>
    <script src="./assets/js/crm.js?v=20260609-deploy-fix" defer></script>
  </head>

  <body class="crm-page">
    <header class="crm-header">
      <a class="crm-brand" href="./index.html" aria-label="Voltar para o site da Perifa Mídia">
        <img
          src="./assets/images/logo-perifa.png"
          width="604"
          height="600"
          alt="Logo da Perifa Mídia"
          decoding="async"
        >
      </a>

      <div>
        <p class="eyebrow">CRM</p>
        <h1>Banco de leads</h1>
      </div>

      <a class="crm-link" href="./index.html">Ver site</a>
    </header>

    <main class="crm-shell">
      <section class="crm-stats" aria-label="Resumo do CRM">
        <article class="crm-stat">
          <span>Total</span>
          <strong data-stat="total">0</strong>
        </article>
        <article class="crm-stat">
          <span>Novos</span>
          <strong data-stat="new">0</strong>
        </article>
        <article class="crm-stat">
          <span>Em aberto</span>
          <strong data-stat="open">0</strong>
        </article>
        <article class="crm-stat">
          <span>Fechados</span>
          <strong data-stat="won">0</strong>
        </article>
        <article class="crm-stat">
          <span>Valor estimado</span>
          <strong data-stat="value">R$ 0</strong>
        </article>
      </section>

      <div class="crm-layout">
        <section class="crm-panel crm-form-panel" aria-labelledby="lead-form-title">
          <div class="crm-panel-heading">
            <p class="eyebrow">Cadastro</p>
            <h2 id="lead-form-title">Lead</h2>
          </div>

          <form class="crm-form" id="crm-form">
            <input type="hidden" name="id" id="lead-id">

            <div class="crm-field crm-field--wide">
              <label for="lead-name">Nome</label>
              <input id="lead-name" name="name" type="text" autocomplete="name" required>
            </div>

            <div class="crm-field">
              <label for="lead-company">Empresa</label>
              <input id="lead-company" name="company" type="text" autocomplete="organization">
            </div>

            <div class="crm-field">
              <label for="lead-role">Cargo</label>
              <input id="lead-role" name="role" type="text" autocomplete="organization-title">
            </div>

            <div class="crm-field">
              <label for="lead-email">E-mail</label>
              <input id="lead-email" name="email" type="email" autocomplete="email">
            </div>

            <div class="crm-field">
              <label for="lead-phone">Telefone</label>
              <input id="lead-phone" name="phone" type="tel" autocomplete="tel">
            </div>

            <div class="crm-field">
              <label for="lead-city">Cidade</label>
              <input id="lead-city" name="city" type="text" autocomplete="address-level2">
            </div>

            <div class="crm-field">
              <label for="lead-state">UF</label>
              <input id="lead-state" name="state" type="text" autocomplete="address-level1" maxlength="2">
            </div>

            <div class="crm-field">
              <label for="lead-interest">Interesse</label>
              <select id="lead-interest" name="interest"></select>
            </div>

            <div class="crm-field">
              <label for="lead-status">Status</label>
              <select id="lead-status" name="status"></select>
            </div>

            <div class="crm-field">
              <label for="lead-source">Origem</label>
              <input id="lead-source" name="source" type="text" value="CRM">
            </div>

            <div class="crm-field">
              <label for="lead-owner">Responsável</label>
              <input id="lead-owner" name="owner" type="text">
            </div>

            <div class="crm-field">
              <label for="lead-next-action">Próxima ação</label>
              <input id="lead-next-action" name="nextAction" type="date">
            </div>

            <div class="crm-field">
              <label for="lead-estimated-value">Valor estimado</label>
              <input id="lead-estimated-value" name="estimatedValue" type="text" inputmode="decimal" placeholder="R$ 0">
            </div>

            <div class="crm-field crm-field--wide">
              <label for="lead-notes">Observações</label>
              <textarea id="lead-notes" name="notes" rows="5"></textarea>
            </div>

            <div class="crm-form-actions">
              <button class="crm-button crm-button--primary" type="submit" data-submit>Salvar lead</button>
              <button class="crm-button" type="button" data-reset>Novo cadastro</button>
            </div>
          </form>
        </section>

        <section class="crm-panel crm-list-panel" aria-labelledby="lead-list-title">
          <div class="crm-toolbar">
            <div class="crm-panel-heading">
              <p class="eyebrow">Pipeline</p>
              <h2 id="lead-list-title">Leads</h2>
            </div>

            <div class="crm-toolbar-actions">
              <button class="crm-button" type="button" data-export-csv>Exportar CSV</button>
              <button class="crm-button" type="button" data-export-json>Backup JSON</button>
              <button class="crm-button" type="button" data-import-json>Importar JSON</button>
              <button class="crm-button crm-button--danger" type="button" data-clear>Limpar</button>
              <input class="visually-hidden" type="file" accept="application/json,.json" data-import-file>
            </div>
          </div>

          <div class="crm-filters" aria-label="Filtros de leads">
            <label>
              <span>Busca</span>
              <input type="search" data-search placeholder="Nome, empresa, e-mail ou cidade">
            </label>

            <label>
              <span>Status</span>
              <select data-status-filter>
                <option value="">Todos</option>
              </select>
            </label>

            <label>
              <span>Interesse</span>
              <select data-interest-filter>
                <option value="">Todos</option>
              </select>
            </label>
          </div>

          <div class="crm-table-wrap">
            <table class="crm-table">
              <thead>
                <tr>
                  <th>Lead</th>
                  <th>Interesse</th>
                  <th>Status</th>
                  <th>Local</th>
                  <th>Próxima ação</th>
                  <th>Valor</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody data-leads-body></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <p class="crm-message" role="status" aria-live="polite" data-crm-message></p>
  </body>
</html>
